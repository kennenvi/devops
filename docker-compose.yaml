services:
  tarefas:
    build:
      context: .
    expose:
      - 8000
    command: "-e main:APP"

  notificacoes:
    build:
      context: .
    expose:
      - 8000
    command: "-e notificacao:APP_NOTIFICACAO"

  gateway:
    build:
      dockerfile: Dockerfile.nginx
      context: .
    ports:
      - "80:8002"
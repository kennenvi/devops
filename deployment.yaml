apiVersion: v1
kind: Service
metadata:
  name: devops-svc
spec:
  type: NodePort
  selector:
    app: devops
  ports:
    - name: api
      targetPort: 8000
      port: 8000
      nodePort: 30005
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploy-devops
  labels:
    app: devops
spec:
  replicas: 5
  selector:
    matchLabels:
      app: devops
  template:
    metadata:
      labels:
        app: devops
    spec:
      containers:
        - name: api
          image: kennenvi/curso-devops:latest
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: svc-notificacao
spec:
  selector:
    app: notificacao
  ports:
    - name: api-notificacao
      targetPort: 8000
      port: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploy-notificacao
  labels:
    app: notificacao
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notificacao
  template:
    metadata:
      labels:
        app: notificacao
    spec:
      containers:
        - name: api-notificacao
          image: kennenvi/curso-devops:latest
          args: ["-e", "notificacao:APP_NOTIFICACAO"]
          ports:
            - containerPort: 8000